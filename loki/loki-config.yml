auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 0.0.0.0
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000
  max_line_size: 256kb
  max_entries_limit_per_query: 5000
  retention_period: 2160h
  retention_stream:
    - selector: '{job="kirov-audit"}'
      priority: 1
      period: 4380h
    - selector: '{job="kirov-security-events"}'
      priority: 1
      period: 4380h
  structured_metadata_max_size: 8192
  structured_metadata_fields:
    - name: service
      type: string
      max_length: 128
    - name: level
      type: string
      max_length: 16
    - name: source
      type: string
      max_length: 256
    - name: trace_id
      type: string
      max_length: 32
    - name: user_id
      type: string
      max_length: 64
    - name: event_type
      type: string
      max_length: 64

ingester:
  lifecycler:
    address: 0.0.0.0
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 30m
  chunk_block_size: 262144
  chunk_retain_period: 1m
  max_chunk_age: 2h
  wal:
    enabled: true
    dir: /loki/wal

querier:
  max_concurrent: 8

query_scheduler:
  max_outstanding_requests_per_tenant: 100

table_manager:
  retention_deletes_enabled: true
  retention_period: 2160h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h

analytics:
  reporting_enabled: false
